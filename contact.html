  <head>
    <meta charset="utf-8" />

    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="top">
          <h1>정희수 (202699182)</h1>
          <p>프론트엔드 중심 포트폴리오</p>
          <small>Updated: 2026-05-29</small>
        </div>
        <nav aria-label="주요 메뉴">
          <ul>
            <li><a href="index.html">홈</a></li>
            <li><a href="about.html">소개</a></li>
            <li><a href="skills.html">기술</a></li>
            <li><a href="projects.html">프로젝트</a></li>
            <li><a href="experience.html">경험</a></li>
            <li><a href="education.html">학력/자격</a></li>
            <li><a href="contact.html" aria-current="page">연락</a></li>
            <li class="nav-theme-item">
              <button id="darkModeBtn" class="dark-btn">테마 변경</button>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
      <section>
        <h2>연락처</h2>
        <address class="card">
          <img
            src="assets/images/call.png"
            alt="연락처"
            class="img-compact"
            style="margin-left: 0"
          />
          <p>
            궁금하신 점이 있다면 아래 연락처나 폼을 통해 메시지를 남겨주세요.
          </p>
          <ul>
            <li>
              <strong>Email:</strong>
              <a href="mailto:jeongheesu12@naver.com">jeongheesu12@naver.com</a>
            </li>
          </ul>
        </address>
      </section>

      <section class="card">
        <img
          src="assets/images/chat.png"
          alt="문의하기"
          class="img-compact"
          style="margin-left: 0"
        />
        <h3>문의하기 (Contact Form)</h3>
        <form id="contactForm" action="#" method="post">
          <fieldset>
            <legend>기본 정보</legend>
            <p>
              <label for="name">이름: </label>
              <input
                type="text"
                id="name"
                name="name"
                required
                placeholder="성함을 입력하세요"
              />
            </p>
            <p>
              <label for="email">이메일: </label>
              <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="email@example.com"
              />
            </p>
          </fieldset>

          <fieldset>
            <legend>문의 내용</legend>
            <p>
              <label for="category">문의 유형: </label>
              <select id="category" name="category">
                <option value="general">일반 문의</option>
                <option value="project">협업 제안</option>
                <option value="etc">기타</option>
              </select>
            </p>
            <p>
              <label for="message">메시지: </label><br />
              <textarea
                id="message"
                name="message"
                rows="6"
                style="width: 100%; margin-top: 10px"
                placeholder="문의 내용을 입력하세요"
              ></textarea>
            </p>
          </fieldset>

          <div style="margin-top: 20px">
            <button type="submit">전송하기</button>
            <button type="reset">초기화</button>
          </div>
        </form>
      </section>
    </main>

    <footer>
      <div class="container">
        <p>© 2026 202699182 정희수 포트폴리오</p>
      </div>
    </footer>
    <button id="toTop">↑ Top</button>
    <script src="assets/script.js" defer></script>
  </body>
</html>
